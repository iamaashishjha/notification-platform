services:
  postgres:
    profiles: ["infra", "api", "workers", "admin", "all"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: ["infra", "api", "workers", "admin", "all"]
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  rabbitmq:
    profiles: ["infra", "api", "workers", "admin", "all"]
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: notification
      RABBITMQ_DEFAULT_PASS: notification
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"

  migrate:
    profiles: ["api", "workers", "admin", "all"]
    image: migrate/migrate:v4.17.1
    restart: "on-failure:5"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./notification-core-api/migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "postgres://notification:notification@postgres:5432/notification?sslmode=disable", "up"]

  seed:
    profiles: ["api", "workers", "admin", "all"]
    image: postgres:16-alpine
    restart: "on-failure:5"
    depends_on:
      migrate:
        condition: service_completed_successfully
    working_dir: /app
    volumes:
      - ./notification-core-api/seeds:/app/seeds:ro
    environment:
      PGPASSWORD: notification
    command: ["psql", "-h", "postgres", "-U", "notification", "-d", "notification", "-f", "seeds/local_seed.sql"]

  notification-api:
    profiles: ["api", "workers", "admin", "all"]
    build:
      context: ./notification-core-api
      args:
        CMD: api
    environment: &backend-environment
      APP_ENV: ${APP_ENV:-local}
      APP_PORT: ${APP_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://notification:notification@postgres:5432/notification?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://notification:notification@rabbitmq:5672/}
      QUEUE_DRIVER: ${QUEUE_DRIVER:-rabbitmq}
      JWT_SECRET: ${JWT_SECRET:-local-only-change-me}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-local-only-change-me}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-local-only-change-me-32-bytes-minimum}
      INTERNAL_ADMIN_TOKEN: ${INTERNAL_ADMIN_TOKEN:-local-only-change-me}
      PROVIDER_MODE: ${PROVIDER_MODE:-mock}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      SPARROW_TOKEN: ${SPARROW_TOKEN:-}
      SPARROW_FROM: ${SPARROW_FROM:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-}
      GENERIC_HTTP_SMS_URL: ${GENERIC_HTTP_SMS_URL:-}
      GENERIC_HTTP_SMS_TOKEN: ${GENERIC_HTTP_SMS_TOKEN:-}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_SERVICE_ACCOUNT_PATH: ${FCM_SERVICE_ACCOUNT_PATH:-}
      WEBSOCKET_ENABLED: ${WEBSOCKET_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://0.0.0.0:3000
    depends_on:
      seed:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker-router:
    profiles: ["workers", "all"]
    build:
      context: ./notification-core-api
      args:
        CMD: worker-router
    environment: *backend-environment
    depends_on: [notification-api]

  worker-scheduler:
    profiles: ["workers", "all"]
    build:
      context: ./notification-core-api
      args:
        CMD: worker-scheduler
    environment: *backend-environment
    depends_on: [notification-api]

  worker-email:
    profiles: ["workers", "all"]
    build:
      context: ./notification-core-api
      args:
        CMD: worker-email
    environment: *backend-environment
    depends_on: [notification-api]

  worker-sms:
    profiles: ["workers", "all"]
    build:
      context: ./notification-core-api
      args:
        CMD: worker-sms
    environment: *backend-environment
    depends_on: [notification-api]

  worker-fcm:
    profiles: ["workers", "all"]
    build:
      context: ./notification-core-api
      args:
        CMD: worker-fcm
    environment: *backend-environment
    depends_on: [notification-api]

  worker-websocket:
    profiles: ["workers", "all"]
    build:
      context: ./notification-core-api
      args:
        CMD: worker-websocket
    environment: *backend-environment
    depends_on: [notification-api]

  worker-retry:
    profiles: ["workers", "all"]
    build:
      context: ./notification-core-api
      args:
        CMD: worker-retry
    environment: *backend-environment
    depends_on: [notification-api]

  worker-dead:
    profiles: ["workers", "all"]
    build:
      context: ./notification-core-api
      args:
        CMD: worker-dead
    environment: *backend-environment
    depends_on: [notification-api]

  notification-admin-ui:
    profiles: ["admin", "all"]
    build:
      context: ./notification-admin-ui
      target: dev
    environment:
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080}
      VITE_APP_NAME: ${VITE_APP_NAME:-Notification Platform}
    depends_on:
      - notification-api
    ports:
      - "${ADMIN_UI_PORT:-3000}:3000"
    volumes:
      - ./notification-admin-ui/src:/app/src

volumes:
  postgres-data:
